<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Politocean Nexus</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #09110f;
        color: #f6fbf8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(39, 192, 145, 0.18), transparent 34rem),
          linear-gradient(135deg, #09110f 0%, #101916 48%, #080b0a 100%);
      }
      main {
        width: min(44rem, calc(100vw - 2rem));
        padding: 3rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 0.75rem;
        background: rgba(11, 18, 16, 0.82);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 1;
      }
      p {
        margin: 0 0 2rem;
        color: #b9c7c2;
        font-size: 1rem;
      }
      nav {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }
      a {
        display: block;
        padding: 1.25rem;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 0.5rem;
        color: inherit;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.05);
      }
      a:hover { border-color: rgba(67, 214, 166, 0.75); background: rgba(67, 214, 166, 0.1); }
      strong { display: block; margin-bottom: 0.35rem; font-size: 1.15rem; }
      span { color: #aab8b2; font-size: 0.9rem; }
      @media (max-width: 560px) {
        main { padding: 1.5rem; }
        nav { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Politocean Nexus</h1>
      <p>Select the mission interface.</p>
      <nav aria-label="Mission interfaces">
        <a href="/eva/"><strong>EVA</strong><span>ROV mission control</span></a>
        <a href="/float/"><strong>FLOAT</strong><span>Float mission control</span></a>
      </nav>
    </main>
  </body>
</html>
